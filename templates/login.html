{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper position-relative">
    <div class="position-absolute top-0 start-0 w-100 h-100" style="background: rgba(0,0,0,0.5); z-index: 0;"></div>
    
    <div class="auth-card glass-card position-relative z-1 my-5 fade-in-up">
        
        <!-- Toggle Buttons -->
        <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Login</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">Register</button>
            </li>
        </ul>
        
        <div class="tab-content" id="pills-tabContent">
            <!-- Login Form -->
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Welcome Back</h3>
                    <p class="text-muted small">Login to access your wholesale dashboard</p>
                </div>
                
                <div class="alert alert-danger d-none" id="login-error"></div>
                
                <form id="loginForm">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="loginUsername" placeholder="Username" required>
                        <label for="loginUsername">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                        <label for="loginPassword">Password</label>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-primary small text-decoration-none fw-medium">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-2" id="loginBtn">Secure Login</button>
                </form>
            </div>
            
            <!-- Register Form -->
            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark">Dealer Registration</h3>
                    <p class="text-muted small">Apply for a B2B wholesale account</p>
                </div>
                
                <div class="alert alert-success d-none" id="register-success"></div>
                <div class="alert alert-danger d-none" id="register-error"></div>

                <form id="registerForm">
                    <div class="row g-2 mb-3">
                        <div class="col-6 form-floating">
                            <input type="text" class="form-control" id="regFirstName" placeholder="First Name" required>
                            <label for="regFirstName" class="ms-1">First Name</label>
                        </div>
                        <div class="col-6 form-floating">
                            <input type="text" class="form-control" id="regLastName" placeholder="Last Name" required>
                            <label for="regLastName" class="ms-1">Last Name</label>
                        </div>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="regUsername" placeholder="Username" required>
                        <label for="regUsername">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="regEmail" placeholder="Email" required>
                        <label for="regEmail">Email Address</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="regPhone" placeholder="Phone Number" required>
                        <label for="regPhone">Phone Number</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="regPassword" placeholder="Password" required>
                        <label for="regPassword">Password</label>
                    </div>
                    
                    <hr class="my-4">
                    <h6 class="fw-bold mb-3">Business Details</h6>
                    
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="regGst" placeholder="GST Number" required>
                        <label for="regGst">GST Number</label>
                    </div>
                    
                    <button type="submit" class="btn btn-success-custom w-100 py-2 mt-2" id="registerBtn">Submit Application</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Logging in...';
        btn.disabled = true;
        
        const data = {
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value
        };

        try {
            const res = await fetch('/api/accounts/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (res.ok) {
                localStorage.setItem('access_token', result.tokens.access);
                localStorage.setItem('refresh_token', result.tokens.refresh);
                localStorage.setItem('user_role', result.role);
                
                if (result.role === 'admin') {
                    window.location.href = '/admin-dashboard/';
                } else if (result.role === 'customer') {
                    window.location.href = '/shop/';
                } else {
                    window.location.href = '/dashboard/';
                }
            } else {
                document.getElementById('login-error').innerText = result.error || 'Login failed';
                document.getElementById('login-error').classList.remove('d-none');
            }
        } catch (err) {
            document.getElementById('login-error').innerText = 'Network error. Try again.';
            document.getElementById('login-error').classList.remove('d-none');
        } finally {
            btn.innerHTML = 'Secure Login';
            btn.disabled = false;
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('registerBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Submitting...';
        btn.disabled = true;

        const data = {
            username: document.getElementById('regUsername').value,
            email: document.getElementById('regEmail').value,
            first_name: document.getElementById('regFirstName').value,
            last_name: document.getElementById('regLastName').value,
            password: document.getElementById('regPassword').value,
            phone_number: document.getElementById('regPhone').value,
            role: 'dealer',
            profile: {
                gst_number: document.getElementById('regGst').value
            }
        };

        try {
            const res = await fetch('/api/accounts/register/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (res.ok) {
                document.getElementById('register-success').innerText = result.message;
                document.getElementById('register-success').classList.remove('d-none');
                document.getElementById('registerForm').reset();
            } else {
                document.getElementById('register-error').innerText = JSON.stringify(result);
                document.getElementById('register-error').classList.remove('d-none');
            }
        } catch (err) {
            document.getElementById('register-error').innerText = 'Network error. Try again.';
            document.getElementById('register-error').classList.remove('d-none');
        } finally {
            btn.innerHTML = 'Submit Application';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
