{% extends "base.html" %}

{% block extra_css %}
<style>
    /* Premium Login Animations & Styles */
    .auth-wrapper {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    
    .video-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        filter: brightness(0.6) saturate(1.2);
    }
    
    .bg-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(13, 110, 253, 0.2) 0%, rgba(0, 0, 0, 0.6) 100%);
        backdrop-filter: blur(4px);
        z-index: 1;
    }

    .premium-glass {
        background: rgba(255, 255, 255, 0.85) !important;
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 30px 60px rgba(0,0,0,0.2), inset 0 0 0 1px rgba(255,255,255,0.5);
        border-radius: 1.5rem;
        transform: translateY(30px);
        opacity: 0;
        animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .form-floating > .form-control {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 0.75rem;
        transition: all 0.3s ease;
    }

    .form-floating > .form-control:focus {
        background: rgba(255, 255, 255, 0.95);
        border-color: var(--bs-primary);
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        transform: translateY(-2px);
    }

    .btn-primary-custom {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: relative;
        overflow: hidden;
    }

    .btn-primary-custom:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(13, 110, 253, 0.3);
    }

    @keyframes slideUpFade {
        from {
            opacity: 0;
            transform: translateY(40px) scale(0.98);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }
    
    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper position-relative">
    <video class="video-bg" autoplay loop muted playsinline>
        <!-- High quality abstract tech/medical background video -->
        <source src="https://cdn.pixabay.com/video/2020/04/10/35924-409156009_large.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>
    
    <div class="auth-card premium-glass position-relative z-3 my-5 p-4" style="max-width: 450px; width: 100%;">
        
        <!-- Toggle Buttons -->
        <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Login</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">Register</button>
            </li>
        </ul>
        
        <div class="tab-content stagger-1" id="pills-tabContent">
            <!-- Login Form -->
            <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                <div class="text-center mb-4 stagger-1">
                    <h3 class="fw-bold text-dark">Welcome Back</h3>
                    <p class="text-muted small">Login to access your wholesale dashboard</p>
                </div>
                
                <div class="alert alert-danger d-none" id="login-error"></div>
                
                <form id="loginForm" class="stagger-2">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="loginUsername" placeholder="Username" required>
                        <label for="loginUsername">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                        <label for="loginPassword">Password</label>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-primary small text-decoration-none fw-medium">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 py-2 stagger-3" id="loginBtn">Secure Login</button>
                </form>
            </div>
            
            <!-- Register Form -->
            <div class="tab-pane fade" id="pills-register" role="tabpanel">
                <div class="text-center mb-4 stagger-1">
                    <h3 class="fw-bold text-dark">Dealer Registration</h3>
                    <p class="text-muted small">Apply for a B2B wholesale account</p>
                </div>
                
                <div class="alert alert-success d-none" id="register-success"></div>
                <div class="alert alert-danger d-none" id="register-error"></div>

                <form id="registerForm" class="stagger-2">
                    <div class="row g-2 mb-3">
                        <div class="col-6 form-floating">
                            <input type="text" class="form-control" id="regFirstName" placeholder="First Name" required>
                            <label for="regFirstName" class="ms-1">First Name</label>
                        </div>
                        <div class="col-6 form-floating">
                            <input type="text" class="form-control" id="regLastName" placeholder="Last Name" required>
                            <label for="regLastName" class="ms-1">Last Name</label>
                        </div>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="regUsername" placeholder="Username" required>
                        <label for="regUsername">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="regEmail" placeholder="Email" required>
                        <label for="regEmail">Email Address</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="regPhone" placeholder="Phone Number" required>
                        <label for="regPhone">Phone Number</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="regPassword" placeholder="Password" required>
                        <label for="regPassword">Password</label>
                    </div>
                    
                    <hr class="my-4">
                    <h6 class="fw-bold mb-3 stagger-3">Business Details</h6>
                    
                    <div class="form-floating mb-3 stagger-3">
                        <input type="text" class="form-control" id="regGst" placeholder="GST Number" required>
                        <label for="regGst">GST Number</label>
                    </div>
                    
                    <button type="submit" class="btn btn-success-custom w-100 py-2 mt-2 stagger-3" id="registerBtn">Submit Application</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Logging in...';
        btn.disabled = true;
        
        const data = {
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value
        };

        try {
            const res = await fetch('/api/accounts/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (res.ok) {
                localStorage.setItem('access_token', result.tokens.access);
                localStorage.setItem('refresh_token', result.tokens.refresh);
                localStorage.setItem('user_role', result.role);
                
                if (result.role === 'admin') {
                    window.location.href = '/admin-dashboard/';
                } else if (result.role === 'customer') {
                    window.location.href = '/shop/';
                } else {
                    window.location.href = '/dashboard/';
                }
            } else {
                document.getElementById('login-error').innerText = result.error || 'Login failed';
                document.getElementById('login-error').classList.remove('d-none');
            }
        } catch (err) {
            document.getElementById('login-error').innerText = 'Network error. Try again.';
            document.getElementById('login-error').classList.remove('d-none');
        } finally {
            btn.innerHTML = 'Secure Login';
            btn.disabled = false;
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('registerBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Submitting...';
        btn.disabled = true;

        const data = {
            username: document.getElementById('regUsername').value,
            email: document.getElementById('regEmail').value,
            first_name: document.getElementById('regFirstName').value,
            last_name: document.getElementById('regLastName').value,
            password: document.getElementById('regPassword').value,
            phone_number: document.getElementById('regPhone').value,
            role: 'dealer',
            profile: {
                gst_number: document.getElementById('regGst').value
            }
        };

        try {
            const res = await fetch('/api/accounts/register/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (res.ok) {
                document.getElementById('register-success').innerText = result.message;
                document.getElementById('register-success').classList.remove('d-none');
                document.getElementById('registerForm').reset();
            } else {
                document.getElementById('register-error').innerText = JSON.stringify(result);
                document.getElementById('register-error').classList.remove('d-none');
            }
        } catch (err) {
            document.getElementById('register-error').innerText = 'Network error. Try again.';
            document.getElementById('register-error').classList.remove('d-none');
        } finally {
            btn.innerHTML = 'Submit Application';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
